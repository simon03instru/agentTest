services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.test
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081}
    restart: unless-stopped
    expose:
      - "8009"

  frontend:
    build:
      context: ./station-dashboard
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8081:80"
